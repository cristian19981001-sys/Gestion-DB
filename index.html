async function cargarCompetenciasUsuario(usuario){
  const {data:competencias}=await supabaseClient.from("Puntaje").select("*").eq(usuario,1);
  if(!competencias || competencias.length===0){
    document.getElementById("componentesUsuario").innerHTML="<div class='card'>No tiene competencias asignadas.</div>";

  }
  let codigos=[];
  competencias.forEach(c=>{ if(c["Codigo RH"]) codigos.push(...c["Codigo RH"].split(" ").map(x=>x.trim())); });
  codigos=[...new Set(codigos)];
  const {data:preguntas}=await supabaseClient.from("questions_pt").select("*").in("Codigo",codigos);
  competenciasGlobal=competencias;
  preguntasGlobal=preguntas || [];
  seccionesUnicas=[...new Set(competencias.map(c=>c["Componente"]))];
  mostrarNavegacion();
  mostrarSeccion(0);
}

function mostrarNavegacion(){
  const nav=document.getElementById("seccionesNav"); nav.innerHTML="";
  seccionesUnicas.forEach((sec,i)=>{
    const btn=document.createElement("button"); btn.textContent=sec; btn.className="seccionBtn";
    if(i===seccionActualIdx) btn.classList.add("active");
    btn.onclick=()=>{ seccionActualIdx=i; actualizar(); };
    nav.appendChild(btn);
  });
}

function actualizar(){
  document.querySelectorAll(".seccionBtn").forEach((b,i)=>b.classList.toggle("active",i===seccionActualIdx));
  mostrarSeccion(seccionActualIdx);
}

function mostrarSeccion(idx){
  const cont=document.getElementById("componentesUsuario"); cont.innerHTML="";
  const sec=seccionesUnicas[idx];
  const tareas=competenciasGlobal.filter(c=>c["Componente"]===sec);
  let codigos=[]; tareas.forEach(t=>{ if(t["Codigo RH"]) codigos.push(...t["Codigo RH"].split(" ").map(x=>x.trim())); });
  codigos=[...new Set(codigos)];
  const preguntas=preguntasGlobal.filter(p=>codigos.includes(p["Codigo"]));
  const card=document.createElement("div"); card.className="card";
  let html=`<strong>Componente:</strong> ${sec}<br><br><ul>`;
  preguntas.forEach(p=>{ html+=`<li>${p["Preguntas"]}<br><input type="text" oninput="actualizarProgreso()"></li>`; });
  html+="</ul>"; card.innerHTML=html;
  cont.appendChild(card);
  actualizarProgreso();
}

function actualizarProgreso(){
  const total=seccionesUnicas.length;
  const progresoBase=(seccionActualIdx/total)*100;
  const inputs=document.querySelectorAll("#componentesUsuario input[type=text]");
  let llenos=0; inputs.forEach(i=>{ if(i.value.trim()!=="") llenos++; });
  const progresoInputs=(inputs.length>0)?(llenos/inputs.length)*(100/total):0;
  const totalProg=progresoBase+progresoInputs;
  document.getElementById("progressBar").style.width=totalProg+"%";
  document.getElementById("progresoTexto").textContent=Math.round(totalProg)+"% completado";
}

async function buscarPorActividad(){

  const actividad = document.getElementById("selectActividad").value;
  const contenedor = document.getElementById("resultadoResponsabilidades");

  if(actividad === ""){
    contenedor.innerHTML = "";
    return;
  }

  contenedor.innerHTML = "Cargando...";

  const { data, error } = await supabaseClient
    .from("Responsabilidades") // ⚠ verifica nombre exacto
    .select("Area, Personal, Responsabilidad_1, Responsabilidad_2");

  if(error){
    console.error(error);
    contenedor.innerHTML = "<p>Error al consultar</p>";
    return;
  }

  // 🔎 Filtrar manualmente
  const filtrados = data.filter(row =>
    row["Responsabilidad_1"] === actividad ||
    row["Responsabilidad_2"] === actividad
  );

  if(filtrados.length === 0){
    contenedor.innerHTML = "<p>No se encontraron resultados.</p>";
    return;
  }

  let html = `
    <div class="card">
      <table style="width:100%; border-collapse:collapse;">
        <tr>
          <th style="padding:8px; border:1px solid #ddd;">Área</th>
          <th style="padding:8px; border:1px solid #ddd;">Persona</th>
          <th style="padding:8px; border:1px solid #ddd;">Responsabilidad</th>
        </tr>
  `;

  filtrados.forEach(row=>{
    html += `
      <tr>
        <td style="padding:8px; border:1px solid #ddd;">${row.Area}</td>
        <td style="padding:8px; border:1px solid #ddd;">${row.Personal}</td>
        <td style="padding:8px; border:1px solid #ddd;">${actividad}</td>
      </tr>
    `;
  });

  html += `
      </table>
    </div>
  `;

  contenedor.innerHTML = html;
}

// BUSCAR RESPONSABILIDADES + QUIENES LA COMPARTEN
// =============================
async function buscarResponsabilidades(){

  const nombre = document.getElementById("selectPersonal").value;
  const contenedor = document.getElementById("resultadoResponsabilidades");

  if(nombre === ""){
    contenedor.innerHTML = "";
    return;
  }

  contenedor.innerHTML = "Cargando...";

  const { data, error } = await supabaseClient
    .from("Responsabilidades") // ⚠ verifica nombre exacto
    .select("*")
    .eq("Personal", nombre);

  if(error){
    console.error(error);
    contenedor.innerHTML = "<p style='color:red;'>Error al consultar</p>";
    return;
  }

  if(!data || data.length === 0){
    contenedor.innerHTML = "<p>No se encontraron resultados.</p>";
    return;
  }

  let html = "";

  for(const row of data){

    // 🔹 TABLA PRINCIPAL (igual estilo anterior, sin colores)
    html += `
      <div class="card">
        <table style="width:100%; border-collapse:collapse;">
          <tr>
            <th style="padding:8px; border:1px solid #ddd;">Área</th>
            <th style="padding:8px; border:1px solid #ddd;">Puesto</th>
            <th style="padding:8px; border:1px solid #ddd;">Responsabilidad 1</th>
            <th style="padding:8px; border:1px solid #ddd;">Responsabilidad 2</th>
            
          </tr>
          <tr>
            <td style="padding:8px; border:1px solid #ddd;">${row.Area || ""}</td>
            <td style="padding:8px; border:1px solid #ddd;">${row.Puesto || ""}</td>
            <td style="padding:8px; border:1px solid #ddd;">${row["Responsabilidad_1"] || ""}</td>
            <td style="padding:8px; border:1px solid #ddd;">${row["Responsabilidad_2"] || ""}</td>
            
          </tr>
        </table>
      </div>
    `;

    // 🔎 Buscar quienes comparten Responsabilidad 1
    const { data: comp1 } = await supabaseClient
      .from("Responsabilidades")
      .select("Area, Personal")
      .eq("Responsabilidad_1", row["Responsabilidad_1"])
      .neq("Personal", nombre);

    // 🔎 Buscar quienes comparten Responsabilidad 2
    const { data: comp2 } = await supabaseClient
      .from("Responsabilidades")
      .select("Area, Personal")
      .eq("Responsabilidad_2", row["Responsabilidad_2"])
      .neq("Personal", nombre);

    // 🔹 TABLA DE COMPARTEN RESPONSABILIDAD
    html += `<div class="card"><h4>Comparten responsabilidad</h4>`;

    if((comp1 && comp1.length > 0) || (comp2 && comp2.length > 0)){

      html += `
        <table style="width:100%; border-collapse:collapse;">
          <tr>
            <th style="padding:8px; border:1px solid #ddd;">Área</th>
            <th style="padding:8px; border:1px solid #ddd;">Personal</th>
            <th style="padding:8px; border:1px solid #ddd;">Actividad</th>
          </tr>
      `;

      if(comp1 && comp1.length > 0){
        comp1.forEach(p=>{
          html += `
            <tr>
              <td style="padding:8px; border:1px solid #ddd;">${p.Area}</td>
              <td style="padding:8px; border:1px solid #ddd;">${p.Personal}</td>
              <td style="padding:8px; border:1px solid #ddd;">${row["Responsabilidad_1"]}</td>
            </tr>
          `;
        });
      }

      if(comp2 && comp2.length > 0){
        comp2.forEach(p=>{
          html += `
            <tr>
              <td style="padding:8px; border:1px solid #ddd;">${p.Area}</td>
              <td style="padding:8px; border:1px solid #ddd;">${p.Personal}</td>
              <td style="padding:8px; border:1px solid #ddd;">${row["Responsabilidad_2"]}</td>
            </tr>
          `;
        });
      }

      html += `</table>`;

    } else {
      html += `<p>No comparte responsabilidades con otros técnicos.</p>`;
    }

    html += `</div>`;
  }

  contenedor.innerHTML = html;
}

    .select("*")
    .limit(1);

  if(error){
    console.error(error);
    select.innerHTML = "<option>Error al cargar</option>";
    return;
  }

  if(!data || data.length === 0){
    select.innerHTML = "<option>No hay datos</option>";
    return;
  }

  // 🔥 Obtener nombres de columnas
  const columnas = Object.keys(data[0]);

  // ❌ Excluir columnas que NO son personas
  const excluir = [
    "id",
    "Categoria",
    "Especialidad",
    "Descripcion",
    "Descripcion de Tarea",
    "Componente",
    "Codigo RH",
    "created_at"
  ];

  const nombres = columnas.filter(col => !excluir.includes(col));

  select.innerHTML = "<option value=''>Seleccione...</option>";

  nombres.forEach(nombre=>{
    const option = document.createElement("option");
    option.value = nombre;
    option.textContent = nombre;
    select.appendChild(option);
  });

  select.addEventListener("change", buscarPuntajeTecnico);
}
